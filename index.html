body{font-family:'Hiragino Sans','Yu Gothic','Meiryo',sans-serif;background:var(--bg);color:var(--text);font-size:14px}

header .sub{font-size:13px;opacity:.8;margin-top:4px}
header .badge{background:#e85d04;color:#fff;padding:4px 14px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap}

/* ── タブナビゲーション ── */
.tabs-nav{background:#fff;border-bottom:2px solid var(--border);padding:0 40px;display:flex;gap:0;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.tab-btn{padding:14px 24px;font-size:13px;font-weight:600;color:var(--muted);border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:color .2s,border-color .2s;white-space:nowrap}
.tab-btn:hover{color:var(--primary)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}

/* ── タブパネル ── */
.tab-panel{display:none}
.tab-panel.active{display:block}

main{max-width:1100px;margin:0 auto;padding:28px 20px 60px}
section{margin-bottom:36px}
.st{font-size:15px;font-weight:700;color:var(--primary);border-left:4px solid var(--accent);padding-left:10px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.kpi{background:var(--card);border-radius:12px;padding:18px 20px;box-shadow:0 1px 4px rgba(0,0,0,.08);border:1px solid var(--border);position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent)}
.kpi.kpi-green::before{background:var(--positive)}
.kpi.kpi-red::before{background:var(--negative)}
.kpi.kpi-yellow::before{background:#f59e0b}
.kl{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.kv{font-size:26px;font-weight:800;color:var(--primary);line-height:1;margin-bottom:4px}
.ks{font-size:11px;color:var(--muted)}
.ks.down{color:var(--negative)}
.ky{display:inline-block;margin-top:8px;padding:2px 8px;border-radius:12px;font-size:12px;font-weight:700;background:#dcfce7;color:#2d9e5f}
.card{background:var(--card);border-radius:12px;padding:20px 24px;box-shadow:0 1px 4px rgba(0,0,0,.08);border:1px solid var(--border);margin-bottom:14px}
.card h3,.card-title{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:14px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.gw-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.hb{background:linear-gradient(135deg,#fef3c7,#fde68a);border-radius:10px;padding:16px 20px;border:1px solid #fcd34d}
.hb .lb{font-size:11px;color:#92400e;font-weight:700;margin-bottom:4px}
.hb .vl{font-size:22px;font-weight:800;color:#92400e}
.hb .sb{font-size:11px;color:#a16207;margin-top:2px}
.ib{background:linear-gradient(135deg,#eff6ff,#dbeafe);border-radius:10px;padding:16px 20px;border:1px solid #93c5fd}
.ib .lb{font-size:11px;color:#1e40af;font-weight:700;margin-bottom:4px}
.ib .vl{font-size:22px;font-weight:800;color:#1e40af}
.ib .sb{font-size:11px;color:#3b82f6;margin-top:2px}
.notice{border-radius:10px;padding:12px 16px;margin-top:12px;font-size:13px;line-height:1.65}
.ny{background:#fffbeb;border:1px solid #fcd34d;color:#92400e}
.nb{background:#eff6ff;border:1px solid #93c5fd;color:#1e40af}
.ng{background:#f0fdf4;border:1px solid #86efac;color:#166534}
.np{background:#fdf4ff;border:1px solid #e9d5ff;color:#6b21a8}
.nr{background:#fef2f2;border:1px solid #fca5a5;color:#991b1b}
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:#374151}
.ld{width:10px;height:10px;border-radius:50%;flex-shrink:0}
table{width:100%;border-collapse:collapse;font-size:13px}

tr:hover td{background:#f8fafc}

.ct{font-size:14px;font-weight:700;margin-bottom:10px}
.ic .ct{color:#d62828}.ac .ct{color:#2d9e5f}
.cb{font-size:13px;color:var(--muted);line-height:1.75}
.cb strong{color:var(--text)}
.model-box{background:#1a3a5c;color:#fff;border-radius:10px;padding:18px;margin-top:12px}
.model-box h4{font-size:13px;font-weight:700;margin-bottom:12px;color:#fbbf24}
.model-flow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.flow-card{background:rgba(255,255,255,.08);border-radius:8px;padding:14px;border:1px solid rgba(255,255,255,.15)}
.flow-card .fct{font-size:11px;font-weight:700;color:#fbbf24;margin-bottom:8px}
.flow-step{display:flex;align-items:flex-start;gap:7px;margin-bottom:7px;font-size:12px;line-height:1.5}
.sn{background:#e85d04;color:#fff;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px}

/* ── 棒グラフ ── */
.bar-chart{display:flex;flex-direction:column;gap:10px}
.bar-row{display:flex;align-items:center;gap:10px;font-size:12px}
.bar-label{min-width:80px;color:var(--muted)}
.bar-track{flex:1;height:22px;background:#f1f5f9;border-radius:4px;overflow:hidden;border:1px solid var(--border)}
.bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:8px;font-size:11px;font-weight:700;color:#fff;min-width:30px}
.bar-fill.red{background:linear-gradient(90deg,#d62828,#ef4444)}
.bar-fill.yellow{background:linear-gradient(90deg,#f59e0b,#fbbf24)}
.bar-fill.blue{background:linear-gradient(90deg,#1a3a5c,#2c5282)}
.bar-num{min-width:50px;text-align:right;font-size:12px;font-weight:700;color:var(--primary)}

/* タグ */
.tag{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px}
.tag-green{background:#dcfce7;color:#166534}
.tag-red{background:#fef2f2;color:#991b1b}
.tag-yellow{background:#fffbeb;color:#92400e}
.tag-blue{background:#eff6ff;color:#1e40af}

@media(max-width:700px){.kpi-grid,.two,.three,.issue-grid,.model-flow{grid-template-columns:1fr}.tabs-nav{padding:0 16px;overflow-x:auto}.tab-btn{padding:12px 14px}}
footer{text-align:center;padding:20px;color:var(--muted);font-size:11px}
</style>
</head>

<div class="cb">4月からの累計離職数182名。5月単月7.1%で推移しており、このペースでは年間60.0%着地が予測される。採用コストの継続的な増大と現場の人員不足が慢性化するリスクがある。</div>
</div>
<div class="ac">
<div class="ct">&#10003; 対策1　離職理由の定量把握と早期フォロー強化</div>
<div class="cb">退職者へのエグジットインタビューを全件実施し、理由を類型化。在籍3ヶ月未満の早期離職者に対して入社後30日・60日時点でのフォロー面談を義務化。高離職組織については店長・マネージャーと連携した改善計画を策定。</div>
</div>

<div class="ic">
<div class="ct">&#9888; 課題2　カンテラ・リファラル採用が前期比大幅減</div>
<div class="cb">カンテラ採用 今期2名（前期27名）、リファラル採用 今期2名（前期10名）と、低コスト採用チャネルが機能不全に近い状態。有料媒体依存が高まり採用単価を押し上げている。</div>
</div>
<div class="ac">
<div class="ct">&#10003; 対策2　社内紹介制度の再活性化</div>
<div class="cb">リファラル紹介者へのインセンティブを見直し、制度の認知率を高める。カンテラについてはPA→正社員登用の実績事例を社内で積極的に広報し、登用ルートの透明性を高める。月次のリファラル紹介件数をKPIとして可視化。</div>

</div>

<div class="ct">&#10003; 対策3　リアス職人事業部への重点介入</div>

</div>

function loadMonth(ym) {
  const d = REPORT_DATA[ym];
  if (!d) return;
  document.getElementById('tab-yojitsu').innerHTML = d.yojitsu;
  document.getElementById('tab-soshiki').innerHTML = d.soshiki;
  document.querySelector('header h1').innerHTML = '&#128202; 月例報告会議 ― ' + d.label;
  document.querySelector('header .sub').innerHTML = 'AP Holdings / HR本部 &#124; ' + d.reportDate;
  document.title = '月例報告会議 ' + d.label;
  const activeBtn = document.querySelector('.tab-btn.active');
  if (activeBtn) {
    const m = activeBtn.getAttribute('onclick').match(/'(\w+)'/);
    if (m) {
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.getElementById('tab-' + m[1]).classList.add('active');
    }
  } else {
    document.getElementById('tab-fujisan').classList.add('active');
  }
}

function switchTab(id, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  btn.classList.add('active');
  window.scrollTo(0, 0);
}

window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'pancake-resize') {
    const f = document.getElementById('pancake-frame');
    if (f) f.style.height = (e.data.height + 20) + 'px';
  }
});

(function() {
  const months = Object.keys(REPORT_DATA).sort().reverse();
  const sel = document.getElementById('month-select');
  months.forEach(ym => {
    const opt = document.createElement('option');
    opt.value = ym;
    opt.textContent = REPORT_DATA[ym].label;
    sel.appendChild(opt);
  });
  sel.value = months[0];
  loadMonth(months[0]);
})();
</script>
